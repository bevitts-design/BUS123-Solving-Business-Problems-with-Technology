<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="390" viewBox="0 0 1000 390"><style>text{font-family:Arial,sans-serif;fill:#1A1F2C}.t{font-size:22px;font-weight:700}.c{font-size:16px}.f{font:700 18px monospace;fill:#355773}</style><rect width="1000" height="390" rx="18" fill="#FAF8F3"/><text x="28" y="38" class="t">Correlation model — keep paired observations in the same column</text><rect x="28" y="65" width="710" height="40" fill="#355773"/><g class="c" fill="#fff"><text x="48" y="91" fill="#fff">Row</text><text x="210" y="91" fill="#fff">Mon</text><text x="280" y="91" fill="#fff">Tue</text><text x="350" y="91" fill="#fff">Wed</text><text x="420" y="91" fill="#fff">Thu</text><text x="490" y="91" fill="#fff">Fri</text><text x="560" y="91" fill="#fff">Sat</text><text x="630" y="91" fill="#fff">Sun</text></g><rect x="180" y="106" width="558" height="45" fill="#FFF2CC"/><rect x="180" y="153" width="558" height="45" fill="#FFF2CC"/><g class="c"><text x="48" y="135">Wait</text><text x="48" y="182">Satisfaction</text><text x="210" y="135">12</text><text x="280" y="135">15</text><text x="350" y="135">10</text><text x="420" y="135">22</text><text x="490" y="135">30</text><text x="560" y="135">8</text><text x="630" y="135">18</text><text x="210" y="182">8.4</text><text x="280" y="182">7.9</text><text x="350" y="182">8.8</text><text x="420" y="182">6.5</text><text x="490" y="182">5.2</text><text x="560" y="182">9.1</text><text x="630" y="182">7.1</text></g><rect x="28" y="225" width="710" height="62" fill="#EAF3EC"/><text x="48" y="263" class="f">=CORREL(C26:I26,C27:I27)</text><text x="700" y="263" class="c" text-anchor="end">-0.9976 → -1.00</text><rect x="770" y="76" width="200" height="211" rx="12" fill="#FFF0EC" stroke="#9C4A2B"/><text x="792" y="112" class="c" font-weight="700">Important</text><text x="792" y="148" class="c">Same day =</text><text x="792" y="174" class="c">same column</text><text x="792" y="212" class="c">Correlation</text><text x="792" y="238" class="c">does not prove</text><text x="792" y="264" class="c">causation.</text><text x="28" y="335" class="c">Result must be between -1 and +1. Format as Number, not Percentage.</text></svg>
