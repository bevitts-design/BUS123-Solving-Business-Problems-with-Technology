document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"017fadd4-9058-4384-8e05-28467be324ec\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{background:#F8F9FA;}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}\n  @keyframes spin{to{transform:rotate(360deg);}}\n  @keyframes drawLine{from{stroke-dashoffset:1;}to{stroke-dashoffset:0;}}\n  input::placeholder{color:#9AA1B4;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#F8F9FA;font-family:Arial,Helvetica,sans-serif;color:#1A1A2E;\">\n\n  <header style=\"background:#0D1B3D;border-bottom:3px solid #C9A227;padding:30px 48px 26px;\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:28px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#C9A227;margin-bottom:10px;\">Markets Lab · Valuation<\u002Fdiv>\n        <h1 style=\"margin:0;font-size:34px;font-weight:700;color:#ffffff;letter-spacing:-.01em;\">Stock Valuation Dashboard<\u002Fh1>\n        <p style=\"margin:8px 0 0;font-style:italic;font-size:17px;color:#CADCFC;\">Pick a company — then read its story in price, ratios, and fair value.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:330px;max-width:100%;\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:#ffffff;border-radius:8px;padding:11px 14px;box-shadow:0 2px 6px rgba(0,0,0,.25);\">\n          <span style=\"font-size:16px;line-height:1;\">🔎<\u002Fspan>\n          <input value=\"{{ query }}\" oninput=\"{{ onInput }}\" placeholder=\"Search any ticker or company…\" style=\"border:none;outline:none;font-size:15px;font-family:Arial,sans-serif;width:100%;color:#1A1A2E;background:transparent;\">\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:54px;left:0;right:0;background:#ffffff;border:1px solid #D7DCE5;border-radius:8px;box-shadow:0 10px 28px rgba(7,15,36,.22);overflow:hidden;z-index:40;\">\n            <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"0\">\n              <button onclick=\"{{ r.pick }}\" style=\"display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:#ffffff;padding:11px 14px;cursor:pointer;border-bottom:1px solid #E6EAF1;\">\n                <span style=\"font-family:'Courier New',monospace;font-weight:700;color:#0D1B3D;font-size:14px;min-width:58px;\">{{ r.symbol }}<\u002Fspan>\n                <span style=\"font-size:13px;color:#3A3F55;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;\">{{ r.name }}<\u002Fspan>\n                <span style=\"font-size:10px;font-weight:700;letter-spacing:.06em;color:#6B7087;background:#EEF3FF;border-radius:4px;padding:2px 6px;flex:none;\">{{ r.exch }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1240px;margin:18px auto 0;display:flex;flex-wrap:wrap;gap:8px;\">\n      <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"12\">\n        <button onclick=\"{{ c.pick }}\" style=\"{{ c.style }}\">{{ c.name }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1240px;margin:0 auto;padding:32px 48px 72px;\">\n\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 0;color:#6B7087;\">\n        <div style=\"width:44px;height:44px;border:4px solid #E6EAF1;border-top-color:#C9A227;border-radius:50%;animation:spin 800ms linear infinite;\"><\u002Fdiv>\n        <div style=\"margin-top:18px;font-size:15px;\">Pulling the numbers for <strong style=\"font-family:'Courier New',monospace;color:#0D1B3D;\">{{ loadingSym }}<\u002Fstrong>…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FFF0F0;border:1px solid #E07070;border-radius:10px;padding:28px 32px;color:#C0392B;\">\n        <div style=\"font-weight:700;font-size:18px;margin-bottom:6px;\">{{ errorTitle }}<\u002Fdiv>\n        <div style=\"font-size:15px;color:#3A3F55;\">{{ errorMsg }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isPrivate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:32px;\">\n        <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n          <div style=\"width:56px;height:56px;border-radius:10px;background:#0D1B3D;display:flex;align-items:center;justify-content:center;font-size:28px;flex:none;\">🚀<\u002Fdiv>\n          <div>\n            <div style=\"font-size:24px;font-weight:700;color:#1A1A2E;line-height:1.15;\">{{ privateName }}<\u002Fdiv>\n            <span style=\"display:inline-block;margin-top:6px;background:#FFF4E6;color:#B2560D;border:1px solid #B2560D;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;\">🔒 Privately held — not on the market<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:20px 0 0;font-size:16px;color:#3A3F55;line-height:1.65;max-width:760px;\">{{ privateBlurb }}<\u002Fp>\n        <div style=\"margin-top:20px;background:#FBF5DE;border:1px solid #E0BC4A;border-radius:8px;padding:16px 20px;font-size:14.5px;color:#1A1A2E;line-height:1.6;max-width:760px;\">\n          <strong style=\"color:#A67F10;\">Why are there no numbers?<\u002Fstrong><br>{{ privateNote }}\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;font-size:14px;color:#6B7087;font-style:italic;\">Pick a public company from the chips above to see a live price, ratios, and a fair-value estimate.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ ready }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n\n        <!-- IDENTITY + PRICE -->\n        <div style=\"display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;\">\n          <div style=\"flex:1 1 420px;background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:24px;display:flex;flex-direction:column;justify-content:space-between;\">\n            <div style=\"display:flex;align-items:center;gap:16px;\">\n              {{ logoEl }}\n              <div>\n                <div style=\"font-size:24px;font-weight:700;color:#1A1A2E;line-height:1.15;\">{{ name }}<\u002Fdiv>\n                <div style=\"margin-top:3px;font-family:'Courier New',monospace;font-weight:600;color:#3D5A8C;font-size:14px;\">{{ tickerLine }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap;\">\n              <span style=\"background:#EEF3FF;color:#1E2E52;border:1px solid #CADCFC;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;\">{{ sector }}<\u002Fspan>\n              <span style=\"font-size:13px;color:#6B7087;\">{{ industry }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:0 1 360px;background:#0D1B3D;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:22px 24px;color:#fff;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#C9A227;\">Current Price<\u002Fdiv>\n            <div style=\"font-size:44px;font-weight:700;line-height:1.05;margin-top:6px;font-variant-numeric:tabular-nums;\">{{ price }}<\u002Fdiv>\n            <div style=\"margin-top:6px;font-size:16px;font-weight:700;color:{{ changeColor }};\">{{ changeStr }}<\u002Fdiv>\n            <div style=\"display:flex;gap:24px;margin-top:18px;border-top:1px solid #26406B;padding-top:14px;\">\n              <div>\n                <div style=\"font-size:11px;color:#8FA0C8;text-transform:uppercase;letter-spacing:.08em;\">Today's range<\u002Fdiv>\n                <div style=\"font-family:'Courier New',monospace;font-size:14px;margin-top:4px;color:#CADCFC;\">{{ dayRange }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px;color:#8FA0C8;text-transform:uppercase;letter-spacing:.08em;\">52-week range<\u002Fdiv>\n                <div style=\"font-family:'Courier New',monospace;font-size:14px;margin-top:4px;color:#CADCFC;\">{{ yearRange }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ABOUT (moved above the chart) -->\n        <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:24px;margin-bottom:20px;\">\n          <div style=\"font-size:20px;font-weight:700;color:#A67F10;margin-bottom:12px;\">About {{ name }}<\u002Fdiv>\n          <p style=\"{{ descStyle }}\">{{ description }}<\u002Fp>\n          <button onclick=\"{{ toggleDesc }}\" style=\"margin-top:8px;border:none;background:transparent;color:#3D5A8C;font-weight:700;font-size:13px;cursor:pointer;padding:0;font-family:Arial,sans-serif;\">{{ descBtn }}<\u002Fbutton>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px;margin-top:22px;border-top:1px solid #E6EAF1;padding-top:20px;\">\n            <div>\n              <div style=\"font-size:11px;color:#6B7087;text-transform:uppercase;letter-spacing:.08em;\">Market cap<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;color:#0D1B3D;margin-top:4px;font-variant-numeric:tabular-nums;\">{{ marketCap }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;color:#6B7087;text-transform:uppercase;letter-spacing:.08em;\">CEO<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;color:#0D1B3D;margin-top:4px;\">{{ ceo }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;color:#6B7087;text-transform:uppercase;letter-spacing:.08em;\">Employees<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;color:#0D1B3D;margin-top:4px;font-variant-numeric:tabular-nums;\">{{ employees }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;color:#6B7087;text-transform:uppercase;letter-spacing:.08em;\">Went public<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;color:#0D1B3D;margin-top:4px;\">{{ ipo }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;color:#6B7087;text-transform:uppercase;letter-spacing:.08em;\">Website<\u002Fdiv>\n              <a href=\"{{ website }}\" target=\"_blank\" style=\"font-size:15px;font-weight:700;color:#3D5A8C;margin-top:4px;display:inline-block;text-decoration:none;\">{{ websiteLabel }} ↗<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- CHART -->\n        <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:24px;margin-bottom:20px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:10px;\">\n            <div style=\"font-size:20px;font-weight:700;color:#A67F10;\">📈 {{ chartTitle }}<\u002Fdiv>\n            <sc-if value=\"{{ hasHist }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"font-weight:700;font-size:14px;color:{{ periodColor }};background:{{ periodBg }};padding:5px 12px;border-radius:999px;\">{{ periodStr }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          {{ chart }}\n          <sc-if value=\"{{ hasHist }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#6B7087;font-family:'Courier New',monospace;margin-top:6px;padding:0 2px;\">\n              <span>{{ histStart }}<\u002Fspan>\n              <span style=\"color:#9AA1B4;font-family:Arial,sans-serif;font-style:italic;\">hover the line to scrub through time<\u002Fspan>\n              <span>{{ histEnd }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- VALUATION RATIOS -->\n        <div style=\"margin-bottom:8px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;\">\n          <div style=\"font-size:20px;font-weight:700;color:#A67F10;\">🏷️ How the market prices it<\u002Fdiv>\n          <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:14px;color:#6B7087;font-style:italic;\">Each ratio answers one question — what are you paying for, and against what?<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;\">\n          <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:20px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#1A1A2E;\">P / E<\u002Fdiv>\n            <div style=\"font-size:34px;font-weight:700;color:#0D1B3D;font-variant-numeric:tabular-nums;line-height:1.1;margin:6px 0 8px;\">{{ peVal }}<\u002Fdiv>\n            <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:12.5px;color:#3A3F55;line-height:1.5;\">Price per <strong>$1 of yearly profit<\u002Fstrong>. A high P/E means investors expect lots of growth.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:20px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#1A1A2E;\">P / B<\u002Fdiv>\n            <div style=\"font-size:34px;font-weight:700;color:#0D1B3D;font-variant-numeric:tabular-nums;line-height:1.1;margin:6px 0 8px;\">{{ pbVal }}<\u002Fdiv>\n            <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:12.5px;color:#3A3F55;line-height:1.5;\">Price vs. the company's <strong>net worth on paper<\u002Fstrong>. Over 1 = paying a premium for brand &amp; future.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:20px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#1A1A2E;\">P / S<\u002Fdiv>\n            <div style=\"font-size:34px;font-weight:700;color:#0D1B3D;font-variant-numeric:tabular-nums;line-height:1.1;margin:6px 0 8px;\">{{ psVal }}<\u002Fdiv>\n            <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:12.5px;color:#3A3F55;line-height:1.5;\">Price vs. <strong>yearly sales<\u002Fstrong>. Handy for fast-growing companies that aren't profitable yet.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:20px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#1A1A2E;\">Dividend Yield<\u002Fdiv>\n            <div style=\"font-size:34px;font-weight:700;color:#0D1B3D;font-variant-numeric:tabular-nums;line-height:1.1;margin:6px 0 8px;\">{{ dyVal }}<\u002Fdiv>\n            <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:12.5px;color:#3A3F55;line-height:1.5;\">Annual <strong>cash paid back<\u002Fstrong> as a % of price. Growth stocks often pay nothing.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- INTRINSIC VALUE -->\n        <div style=\"background:#ffffff;border:1px solid #D7DCE5;border-radius:6px;box-shadow:0 1px 2px rgba(15,26,50,.06);padding:24px;margin-bottom:20px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n            <div style=\"font-size:20px;font-weight:700;color:#A67F10;\">🧮 Is it cheap or expensive?<\u002Fdiv>\n            <span style=\"font-weight:700;font-size:14px;color:#fff;background:{{ verdictColor }};padding:6px 16px;border-radius:999px;\">{{ verdictLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n            <p style=\"margin:10px 0 20px;font-size:15px;color:#3A3F55;line-height:1.6;max-width:760px;\">A <strong>discounted-cash-flow (DCF)<\u002Fstrong> model estimates what a share is \"really\" worth by adding up the cash the business is expected to generate. Compare that fair value to today's price.<\u002Fp>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasDcf }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:14px;max-width:760px;margin-top:18px;\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;\">\n                  <span style=\"font-weight:700;color:#1A1A2E;\">Model fair value (DCF)<\u002Fspan>\n                  <span style=\"font-family:'Courier New',monospace;font-weight:700;color:#1A1A2E;\">{{ fairStr }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:18px;background:#EEF3FF;border-radius:999px;overflow:hidden;\">\n                  <div style=\"{{ fairBarStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;\">\n                  <span style=\"font-weight:700;color:#1A1A2E;\">Today's market price<\u002Fspan>\n                  <span style=\"font-family:'Courier New',monospace;font-weight:700;color:#1A1A2E;\">{{ priceBare }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:18px;background:#EEF3FF;border-radius:999px;overflow:hidden;\">\n                  <div style=\"{{ priceBarStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:18px;background:{{ verdictWashBg }};border:1px solid {{ verdictWashBorder }};border-radius:8px;padding:14px 18px;font-size:14.5px;color:#1A1A2E;line-height:1.55;max-width:760px;\">\n            {{ verdictSentence }}\n          <\u002Fdiv>\n          <sc-if value=\"{{ showTeaching }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:12px;font-size:12.5px;color:#6B7087;font-style:italic;line-height:1.5;max-width:760px;\">⚠️ A DCF is only as good as its assumptions — small changes in growth or interest-rate guesses swing the answer a lot. Treat this as a conversation starter, never a buy/sell call.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:1400},&quot;defaultSymbol&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;AAPL&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showTeaching&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;chartRange&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;6 Months&quot;,&quot;options&quot;:[&quot;1 Month&quot;,&quot;6 Months&quot;,&quot;1 Year&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nconst API_KEY = 'HoHoRZi4LW8xQixu5MyTxLeRLFTQvly2';\nconst BASE = 'https://financialmodelingprep.com/stable';\nconst CURATED = [\n  ['AAPL','Apple'],['MSFT','Microsoft'],['NVDA','Nvidia'],['TSLA','Tesla'],\n  ['AMZN','Amazon'],['GOOGL','Alphabet'],['NFLX','Netflix'],['DIS','Disney'],\n  ['NKE','Nike'],['SBUX','Starbucks'],['SPOT','Spotify'],['AMD','AMD'],\n  ['SPCX','SpaceX']\n];\nconst RANGE_MONTHS = { '1 Month':1, '6 Months':6, '1 Year':12 };\nconst RANGE_TITLE  = { '1 Month':'1-Month', '6 Months':'6-Month', '1 Year':'1-Year' };\n// Companies that can't be fully valued (e.g. no public ticker) — handled as a teaching moment.\nconst PRIVATE = {};\n\nclass Component extends DCLogic {\n  state = { symbol:'AAPL', loadingSym:'AAPL', query:'', results:[], data:null, loading:true, error:null, hoverIdx:null, showFullDesc:false };\n\n  componentDidMount(){ this.load(this.props.defaultSymbol || 'AAPL'); }\n\n  componentDidUpdate(prevProps){\n    if(prevProps.defaultSymbol !== this.props.defaultSymbol && this.props.defaultSymbol){\n      this.load(this.props.defaultSymbol);\n    } else if(prevProps.chartRange !== this.props.chartRange){\n      this.load(this.state.symbol);\n    }\n  }\n\n  async load(symbol){\n    symbol = (symbol||'').toUpperCase();\n    if(PRIVATE[symbol]){\n      this.setState({ loading:false, error:null, data:null, priv:PRIVATE[symbol], symbol, query:'', results:[], hoverIdx:null, showFullDesc:false });\n      return;\n    }\n    this.setState({ loading:true, error:null, priv:null, query:'', results:[], hoverIdx:null, showFullDesc:false, loadingSym:symbol });\n    try{\n      // Each endpoint is fetched independently — some symbols (e.g. recent listings)\n      // expose a profile but lock quote/history/ratios/DCF behind a paid tier. We\n      // tolerate any of them returning null and build from whatever is available.\n      const j = (u)=>fetch(u).then(r=>r.json()).catch(()=>null);\n      const pick = (v)=>{ const o = Array.isArray(v)?v[0]:v; return (o && !o['Error Message']) ? o : null; };\n      const [qA,pA,hA,rA,dA] = await Promise.all([\n        j(`${BASE}/quote?symbol=${symbol}&apikey=${API_KEY}`),\n        j(`${BASE}/profile?symbol=${symbol}&apikey=${API_KEY}`),\n        j(`${BASE}/historical-price-eod/light?symbol=${symbol}&apikey=${API_KEY}`),\n        j(`${BASE}/ratios-ttm?symbol=${symbol}&apikey=${API_KEY}`),\n        j(`${BASE}/discounted-cash-flow?symbol=${symbol}&apikey=${API_KEY}`)\n      ]);\n      const limited = [qA,pA,hA,rA,dA].some(v=> v && !Array.isArray(v) && v['Error Message'] && /limit reach|upgrade your plan/i.test(v['Error Message']));\n      const Q = pick(qA) || {};\n      const P = pick(pA) || {};\n      const price = (Q.price!=null) ? Q.price : P.price;\n      if(price==null){\n        if(limited){\n          this.setState({ loading:false, error:true, errorTitle:'Daily data limit reached', errorMsg:'The free Financial Modeling Prep plan caps how many lookups can run per day, and that cap has been hit. It resets within 24 hours — or drop in a paid API key for unlimited use in class.' });\n          return;\n        }\n        throw new Error('No data found for \"'+symbol+'\"');\n      }\n      const quote = {\n        symbol: Q.symbol||P.symbol||symbol,\n        name: Q.name||P.companyName||symbol,\n        price,\n        change: (Q.change!=null)?Q.change:(P.change!=null?P.change:0),\n        changePercentage: (Q.changePercentage!=null)?Q.changePercentage:(P.changePercentage!=null?P.changePercentage:0),\n        marketCap: (Q.marketCap!=null)?Q.marketCap:P.marketCap,\n        volume: (Q.volume!=null)?Q.volume:P.volume,\n        dayLow: Q.dayLow, dayHigh: Q.dayHigh,\n        yearLow: Q.yearLow, yearHigh: Q.yearHigh,\n        exchange: Q.exchange||P.exchange\n      };\n      if((quote.yearLow==null || quote.yearHigh==null) && typeof P.range==='string' && P.range.indexOf('-')>0){\n        const parts = P.range.split('-').map(x=>parseFloat(x));\n        if(quote.yearLow==null && isFinite(parts[0])) quote.yearLow = parts[0];\n        if(quote.yearHigh==null && isFinite(parts[1])) quote.yearHigh = parts[1];\n      }\n      const ratios = pick(rA) || {};\n      const dcf = pick(dA) || {};\n      const months = RANGE_MONTHS[this.props.chartRange] || 6;\n      const cut = new Date(); cut.setMonth(cut.getMonth()-months);\n      const cutStr = cut.toISOString().slice(0,10);\n      const rawHist = Array.isArray(hA) ? hA : [];\n      let hist = rawHist.filter(p=>p && p.price && p.date >= cutStr);\n      if(hist.length < 2) hist = rawHist.slice(0, Math.max(30, months*22));\n      hist = hist.slice().reverse(); // oldest -> newest\n      this.setState({ loading:false, priv:null, data:{ quote, profile:P, ratios, dcf, hist }, symbol });\n    }catch(e){\n      this.setState({ loading:false, error:true, errorTitle:'Couldn\\u2019t load that one', errorMsg:String(e.message||e)+' — try a different ticker, or pick one from the chips above.' });\n    }\n  }\n\n  onQuery(v){\n    this.setState({ query:v });\n    clearTimeout(this._t);\n    if(!v.trim()){ this.setState({ results:[] }); return; }\n    this._t = setTimeout(async ()=>{\n      try{\n        const q = encodeURIComponent(v);\n        const [byName, bySym] = await Promise.all([\n          fetch(`${BASE}/search-name?query=${q}&limit=12&apikey=${API_KEY}`).then(x=>x.json()).catch(()=>[]),\n          fetch(`${BASE}/search-symbol?query=${q}&limit=12&apikey=${API_KEY}`).then(x=>x.json()).catch(()=>[])\n        ]);\n        const merged = [...(Array.isArray(byName)?byName:[]), ...(Array.isArray(bySym)?bySym:[])].filter(x=>x && x.symbol);\n        const seen = {}; const dedup = [];\n        for(const x of merged){ if(!seen[x.symbol]){ seen[x.symbol]=1; dedup.push(x); } }\n        const major = {NASDAQ:0, NYSE:0, AMEX:0};\n        dedup.sort((a,b)=>{\n          const am = (a.exchange in major)?0:1, bm = (b.exchange in major)?0:1;\n          if(am!==bm) return am-bm;\n          return (a.symbol.includes('.')?1:0)-(b.symbol.includes('.')?1:0);\n        });\n        this.setState({ results: dedup.slice(0,8) });\n      }catch(e){ /* ignore */ }\n    }, 280);\n  }\n\n  fmtCap(n){\n    if(n==null||!isFinite(n)) return '—';\n    if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T';\n    if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';\n    if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';\n    return '$'+Math.round(n).toLocaleString();\n  }\n  ratio(v){ return (v!=null && isFinite(v) && v>0) ? Number(v).toFixed(1) : '—'; }\n\n  buildChart(){\n    const h = React.createElement;\n    const d = this.state.data;\n    if(!d) return null;\n    const s = d.hist;\n    if(!s || s.length < 2) return h('div',{style:{padding:'40px 24px',textAlign:'center',color:'#6B7087',background:'#F8F9FA',border:'1px dashed #D7DCE5',borderRadius:'8px'}},\n      h('div',{style:{fontSize:'28px',marginBottom:'8px'}},'📉'),\n      h('div',{style:{fontSize:'15px',fontWeight:700,color:'#1A1A2E',marginBottom:'4px'}},'Daily price history isn\\u2019t available for this listing'),\n      h('div',{style:{fontSize:'13px',maxWidth:'440px',margin:'0 auto',lineHeight:1.5}},'Newly-listed or restricted tickers on the free data tier expose a snapshot price but not the full chart. The quote, market cap, and profile above are still live.'));\n    const W=1000,H=330,padL=10,padR=58,padT=18,padB=14;\n    const iw=W-padL-padR, ih=H-padT-padB;\n    const prices=s.map(p=>p.price);\n    const min=Math.min(...prices), max=Math.max(...prices), rng=(max-min)||1;\n    const X=i=>padL+(i/(s.length-1))*iw;\n    const Y=v=>padT+(1-(v-min)/rng)*ih;\n    const up = s[s.length-1].price >= s[0].price;\n    const col = up?'#1E8449':'#C0392B';\n    let line='';\n    for(let i=0;i<s.length;i++){ line += (i?'L':'M')+X(i).toFixed(1)+' '+Y(s[i].price).toFixed(1)+' '; }\n    const area = line+'L'+X(s.length-1).toFixed(1)+' '+(padT+ih)+' L'+X(0).toFixed(1)+' '+(padT+ih)+' Z';\n    const grid=[0,0.25,0.5,0.75,1].map((t,i)=>{\n      const y=padT+t*ih, val=max-t*rng;\n      return h('g',{key:'g'+i},\n        h('line',{x1:padL,y1:y,x2:padL+iw,y2:y,stroke:'#E6EAF1',strokeWidth:1}),\n        h('text',{x:padL+iw+8,y:y+4,fontSize:13,fill:'#6B7087',fontFamily:'Courier New, monospace'},'$'+val.toFixed(0))\n      );\n    });\n    const hi=this.state.hoverIdx;\n    const els=[\n      h('defs',{key:'def'},\n        h('linearGradient',{id:'fmpArea',x1:0,y1:0,x2:0,y2:1},\n          h('stop',{offset:'0%',stopColor:col,stopOpacity:0.16}),\n          h('stop',{offset:'100%',stopColor:col,stopOpacity:0}))),\n      h('g',{key:'grid'},grid),\n      h('path',{key:'area',d:area,fill:'url(#fmpArea)'}),\n      h('path',{key:'line',d:line,fill:'none',stroke:col,strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round',pathLength:1,style:{strokeDasharray:1,animation:'drawLine 950ms ease-out forwards'}})\n    ];\n    if(hi!=null && s[hi]){\n      const hx=X(hi), hy=Y(s[hi].price);\n      els.push(h('line',{key:'gl',x1:hx,y1:padT,x2:hx,y2:padT+ih,stroke:'#0D1B3D',strokeWidth:1,strokeDasharray:'4 4',opacity:0.5}));\n      els.push(h('circle',{key:'dot',cx:hx,cy:hy,r:5,fill:'#fff',stroke:col,strokeWidth:3}));\n    }\n    const svg=h('svg',{key:'svg'+this.state.symbol,viewBox:'0 0 '+W+' '+H,width:'100%',height:'auto',preserveAspectRatio:'none',style:{display:'block'},\n      onMouseMove:(e)=>{ const r=e.currentTarget.getBoundingClientRect(); const ratio=(e.clientX-r.left)/r.width; let idx=Math.round(ratio*(s.length-1)); idx=Math.max(0,Math.min(s.length-1,idx)); if(idx!==this.state.hoverIdx) this.setState({hoverIdx:idx}); },\n      onMouseLeave:()=>this.setState({hoverIdx:null})}, els);\n    let tip=null;\n    if(hi!=null && s[hi]){\n      const leftPct=(X(hi)/W)*100;\n      const dt=new Date(s[hi].date+'T00:00:00');\n      const dstr=dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});\n      tip=h('div',{key:'tip',style:{position:'absolute',top:'-4px',left:leftPct+'%',transform:'translateX(-50%)',background:'#0D1B3D',color:'#fff',padding:'7px 11px',borderRadius:'6px',whiteSpace:'nowrap',pointerEvents:'none',boxShadow:'0 4px 12px rgba(7,15,36,.3)'}},\n        h('div',{style:{fontFamily:'Courier New, monospace',fontWeight:700,fontSize:'14px'}},'$'+s[hi].price.toFixed(2)),\n        h('div',{style:{color:'#CADCFC',fontSize:'11px'}},dstr));\n    }\n    return h('div',{key:'wrap'+this.state.symbol,style:{position:'relative',width:'100%'}},svg,tip);\n  }\n\n  renderVals(){\n    const st=this.state;\n    const chips = CURATED.map(([sym,name])=>{\n      const active = sym===st.symbol;\n      return { sym, name, pick:()=>this.load(sym), style:{\n        padding:'7px 15px', borderRadius:'999px',\n        border: active?'1px solid #C9A227':'1px solid #3D5A8C',\n        background: active?'#C9A227':'transparent',\n        color: active?'#0D1B3D':'#CADCFC',\n        fontWeight:700, fontSize:'13px', cursor:'pointer', fontFamily:'Arial,sans-serif',\n        transition:'background 120ms, color 120ms'\n      }};\n    });\n    const results = (st.results||[]).map(r=>({ symbol:r.symbol, name:r.name||r.companyName||'', exch:r.exchange||'', pick:()=>this.load(r.symbol) }));\n\n    const base = {\n      loading: !!st.loading,\n      error: !!st.error,\n      errorMsg: st.errorMsg||'',\n      errorTitle: st.errorTitle||'Couldn\\u2019t load that one',\n      ready: !st.loading && !st.error && !!st.data,\n      loadingSym: st.loadingSym,\n      query: st.query,\n      onInput: (e)=>this.onQuery(e.target.value),\n      hasResults: !!(st.results && st.results.length),\n      results, chips,\n      showTeaching: this.props.showTeaching !== false,\n      isPrivate: !!st.priv,\n      privateName: st.priv ? st.priv.name : '',\n      privateBlurb: st.priv ? st.priv.blurb : '',\n      privateNote: st.priv ? st.priv.note : ''\n    };\n    if(!base.ready) return base;\n\n    const d=st.data, q=d.quote, p=d.profile, r=d.ratios, s=d.hist;\n    const chg=q.change||0, pct=q.changePercentage||0, upDay=chg>=0;\n    const dcfFair = (d.dcf && (d.dcf.dcf!=null)) ? d.dcf.dcf : null;\n    const hasDcf = dcfFair!=null && dcfFair>0;\n    const price = q.price;\n    const rangeKey = this.props.chartRange || '6 Months';\n\n    const hasHist = !!(s && s.length >= 2);\n    const fmtDate=(ds)=>{ const dt=new Date(ds+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };\n    let perPct=0, perUp=true;\n    if(hasHist){ const first=s[0].price, last=s[s.length-1].price; perPct=((last-first)/first)*100; perUp=perPct>=0; }\n\n    let verdictLabel='—', verdictColor='#A67F10', verdictSentence='', washBg='#FBF5DE', washBorder='#E0BC4A';\n    let fairBarW=0, priceBarW=0;\n    if(dcfFair!=null && dcfFair>0){\n      const diff=((dcfFair-price)/price)*100;\n      const mx=Math.max(dcfFair,price)*1.08;\n      fairBarW=Math.max(2,(dcfFair/mx)*100);\n      priceBarW=Math.max(2,(price/mx)*100);\n      if(dcfFair > price*1.05){\n        verdictLabel='Possibly Undervalued'; verdictColor='#1E8449'; washBg='#F0FFF4'; washBorder='#27AE60';\n        verdictSentence='The model\\u2019s fair value sits about '+Math.abs(diff).toFixed(0)+'% ABOVE today\\u2019s price — by this estimate, the market may be offering it at a discount.';\n      } else if(dcfFair < price*0.95){\n        verdictLabel='Possibly Overvalued'; verdictColor='#C0392B'; washBg='#FFF0F0'; washBorder='#E07070';\n        verdictSentence='The model\\u2019s fair value sits about '+Math.abs(diff).toFixed(0)+'% BELOW today\\u2019s price — investors are paying up for growth the simple model doesn\\u2019t capture.';\n      } else {\n        verdictLabel='About Fairly Valued'; verdictColor='#A67F10'; washBg='#FBF5DE'; washBorder='#E0BC4A';\n        verdictSentence='The model\\u2019s fair value lands within ~5% of today\\u2019s price — by this estimate, the stock looks roughly fairly priced.';\n      }\n    } else {\n      verdictLabel='No estimate'; verdictSentence='A DCF fair value isn\\u2019t available for this company right now.';\n    }\n\n    const barBase={height:'100%',borderRadius:'999px',display:'flex',alignItems:'center'};\n    const dy = (r.dividendYieldTTM!=null && isFinite(r.dividendYieldTTM)) ? (r.dividendYieldTTM*100).toFixed(2)+'%' : '0.00%';\n\n    const h = React.createElement;\n    const nm = p.companyName||q.name||st.symbol;\n    const logoEl = h('div',{style:{width:'56px',height:'56px',borderRadius:'10px',background:'#F8F9FA',border:'1px solid #E6EAF1',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flex:'none',position:'relative'}},\n      h('span',{style:{fontWeight:700,fontSize:'22px',color:'#0D1B3D'}},(nm||'?').charAt(0).toUpperCase()),\n      p.image ? h('img',{src:p.image,alt:'',onError:(e)=>{e.target.style.display='none';},style:{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain',background:'#F8F9FA'}}) : null\n    );\n\n    return Object.assign(base, {\n      chart: this.buildChart(),\n      logoEl,\n      name: nm,\n      tickerLine: (q.symbol||st.symbol)+' · '+(p.exchange||q.exchange||''),\n      sector: p.sector||'—',\n      industry: p.industry||'',\n      price: '$'+price.toFixed(2),\n      changeStr: (upDay?'\\u25B2 +':'\\u25BC ')+chg.toFixed(2)+'  ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)',\n      changeColor: upDay?'#27AE60':'#E07070',\n      dayRange: (q.dayLow!=null||q.dayHigh!=null) ? ('$'+(q.dayLow!=null?q.dayLow.toFixed(2):'—')+' – $'+(q.dayHigh!=null?q.dayHigh.toFixed(2):'—')) : 'Not available',\n      yearRange: (q.yearLow!=null||q.yearHigh!=null) ? ('$'+(q.yearLow!=null?q.yearLow.toFixed(0):'—')+' – $'+(q.yearHigh!=null?q.yearHigh.toFixed(0):'—')) : 'Not available',\n      hasHist,\n      hasDcf,\n      chartTitle: (RANGE_TITLE[rangeKey]||'6-Month')+' Price History',\n      periodStr: (perUp?'\\u25B2 +':'\\u25BC ')+perPct.toFixed(1)+'% over '+rangeKey.toLowerCase(),\n      periodColor: perUp?'#1E8449':'#C0392B',\n      periodBg: perUp?'#F0FFF4':'#FFF0F0',\n      histStart: hasHist?fmtDate(s[0].date):'',\n      histEnd: hasHist?fmtDate(s[s.length-1].date):'',\n      peVal: this.ratio(r.priceToEarningsRatioTTM),\n      pbVal: this.ratio(r.priceToBookRatioTTM),\n      psVal: this.ratio(r.priceToSalesRatioTTM),\n      dyVal: dy,\n      fairStr: dcfFair!=null ? '$'+dcfFair.toFixed(2) : '—',\n      priceBare: '$'+price.toFixed(2),\n      fairBarStyle: Object.assign({}, barBase, {width:fairBarW+'%', background:'#C9A227'}),\n      priceBarStyle: Object.assign({}, barBase, {width:priceBarW+'%', background:'#0D1B3D'}),\n      verdictLabel, verdictColor,\n      verdictWashBg: washBg, verdictWashBorder: washBorder,\n      verdictSentence,\n      description: p.description||'',\n      descStyle: st.showFullDesc\n        ? {margin:'0',fontSize:'15px',lineHeight:'1.65',color:'#3A3F55'}\n        : {margin:'0',fontSize:'15px',lineHeight:'1.65',color:'#3A3F55',display:'-webkit-box',WebkitLineClamp:4,WebkitBoxOrient:'vertical',overflow:'hidden'},\n      descBtn: st.showFullDesc?'Show less':'Read more',\n      toggleDesc: ()=>this.setState(x=>({showFullDesc:!x.showFullDesc})),\n      marketCap: this.fmtCap(q.marketCap||p.marketCap),\n      ceo: p.ceo||'—',\n      employees: p.fullTimeEmployees ? Number(p.fullTimeEmployees).toLocaleString() : '—',\n      ipo: p.ipoDate||'—',\n      website: p.website||'#',\n      websiteLabel: (p.website||'').replace(/^https?:\\/\\//,'').replace(/\\/$/,'')||'site'\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
