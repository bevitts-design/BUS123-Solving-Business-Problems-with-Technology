<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380"><style>text{font-family:Arial,sans-serif;fill:#1A1F2C}.t{font-size:22px;font-weight:700}.c{font-size:17px}.f{font:700 18px monospace;fill:#355773}</style><rect width="1000" height="380" rx="18" fill="#FAF8F3"/><text x="28" y="38" class="t">Cash-flow model — signs matter</text><g class="c"><rect x="28" y="65" width="570" height="42" fill="#355773"/><text x="48" y="92" fill="#fff" font-weight="700">Cash-flow section</text><text x="480" y="92" fill="#fff" font-weight="700">Amount</text><text x="48" y="140">Operating</text><text x="570" y="140" text-anchor="end">$310,000</text><text x="48" y="182">Investing</text><text x="570" y="182" text-anchor="end" fill="#9C4A2B">($580,000)</text><text x="48" y="224">Financing</text><text x="570" y="224" text-anchor="end">$220,000</text></g><rect x="28" y="242" width="570" height="50" fill="#EAF3EC"/><text x="48" y="274" class="c" font-weight="700">Net change</text><text x="275" y="274" class="f">=SUM(B4:B6)</text><text x="570" y="274" class="c" text-anchor="end">($50,000)</text><rect x="28" y="304" width="570" height="50" fill="#EAF3EC"/><text x="48" y="336" class="c" font-weight="700">Closing cash</text><text x="275" y="336" class="f">=B9+B8</text><text x="570" y="336" class="c" text-anchor="end">$412,000</text><rect x="635" y="75" width="335" height="112" rx="12" fill="#FFF0EC" stroke="#9C4A2B"/><text x="658" y="111" class="c" font-weight="700">Outflow ≠ positive expense</text><text x="658" y="145" class="c">Enter investing cash flow as</text><text x="658" y="173" class="f">-580000</text><rect x="635" y="211" width="335" height="120" rx="12" fill="#EAF3EC" stroke="#4A7C5E"/><text x="658" y="247" class="c" font-weight="700">Reconciliation</text><text x="658" y="281" class="c">Opening cash + net change</text><text x="658" y="311" class="c">must equal closing cash.</text></svg>
