<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUS123 MATH M11 · Hospital Board Crisis Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../activities/templates/decision-lab/decision-lab.css">
</head>
<body>
  <header class="top">
    <div class="shell top-grid">
      <div>
        <p class="eyebrow" id="kicker"></p>
        <h1 id="title"></h1>
        <p id="subtitle"></p>
      </div>
      <div class="progress-card">
        <span class="meta-label">Board prep</span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-copy"><span id="progressCount">0/0</span><span id="progressPercent">0%</span></div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="lab-grid">
      <aside class="panel">
        <h2 id="panelTitle"></h2>
        <p id="panelIntro"></p>
        <div class="step-list" id="stepList"></div>
        <div class="actions" style="margin-top:16px;">
          <button class="secondary" id="resetBtn" type="button">Reset activity</button>
        </div>
      </aside>

      <div>
        <section class="workspace">
          <div class="workspace-head">
            <div>
              <p class="step-kicker" id="stepKicker"></p>
              <h2 id="stepTitle"></h2>
            </div>
            <div class="scenario-badge">
              <strong id="scenarioName"></strong>
              <span id="scenarioCopy"></span>
            </div>
          </div>

          <div class="workspace-body">
            <div class="brief">
              <div class="brief-card">
                <h3 id="briefTitle"></h3>
                <div id="briefCopy"></div>
              </div>
              <div class="brief-card">
                <h3 id="taskTitle"></h3>
                <div id="taskCopy"></div>
              </div>
            </div>

            <section>
              <p class="section-label" id="evidenceLabel"></p>
              <div class="evidence-grid" id="evidenceGrid"></div>
            </section>

            <section>
              <p class="section-label" id="choiceLabel"></p>
              <div class="choice-grid" id="choiceGrid"></div>
            </section>

            <div class="reflection">
              <label for="reflection" id="reflectionLabel"></label>
              <textarea id="reflection"></textarea>
            </div>

            <div class="actions">
              <button class="primary" id="checkBtn" type="button">Check briefing</button>
              <button class="secondary" id="nextBtn" type="button">Next round</button>
            </div>
          </div>
        </section>

        <section class="feedback" id="feedback">
          <h2 id="feedbackTitle"></h2>
          <p id="feedbackCopy"></p>
          <div class="score-strip">
            <div class="score-card"><span class="score-label">Selected</span><strong id="scoreA">0</strong></div>
            <div class="score-card"><span class="score-label">Round</span><strong id="scoreB">Open</strong></div>
            <div class="score-card"><span class="score-label">Memo</span><strong id="scoreC">0 chars</strong></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="../../activities/templates/decision-lab/decision-lab.js"></script>
</body>
</html>
