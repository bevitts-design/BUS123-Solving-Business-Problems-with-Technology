<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360"><style>text{font-family:Arial,sans-serif;fill:#1A1F2C}.t{font-size:22px;font-weight:700}.c{font-size:17px}.f{font:700 18px monospace;fill:#355773}</style><rect width="1000" height="360" rx="18" fill="#FAF8F3"/><text x="28" y="38" class="t">Standard deviation — define the population before choosing the function</text><rect x="28" y="65" width="944" height="52" rx="8" fill="#fff" stroke="#C9CED6"/><text x="48" y="98" class="c" font-weight="700">fx</text><text x="92" y="98" class="f">=STDEV.S(C17:G17)</text><rect x="28" y="145" width="450" height="155" rx="12" fill="#EAF3EC" stroke="#4A7C5E"/><text x="52" y="181" class="c" font-weight="700">Sample · STDEV.S</text><text x="52" y="218" class="c">Use observations to estimate</text><text x="52" y="248" class="c">a broader process or population.</text><text x="52" y="280" class="f">Expected: 3.16 hours</text><rect x="522" y="145" width="450" height="155" rx="12" fill="#FFF7E6" stroke="#B8843D"/><text x="546" y="181" class="c" font-weight="700">Population · STDEV.P</text><text x="546" y="218" class="c">Use every observation in the</text><text x="546" y="248" class="c">population defined by the question.</text><text x="546" y="280" class="f">Expected: 2.83 hours</text><text x="28" y="335" class="c">Both results use the same inputs; the denominator differs.</text></svg>
